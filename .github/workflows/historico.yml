name: Atualiza histórico (snapshot do acumulo)

# Roda quando você troca o acumulo.csv. Grava um ponto no historico.json e
# faz commit de volta — assim a série temporal é completa e compartilhada,
# sem depender de quem abre o painel. (O path-filter impede laço: o commit
# do historico.json não dispara este workflow de novo.)
on:
  push:
    branches: [main]
    paths: ['acumulo.csv']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: historico
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gera snapshot do acumulo
        env:
          TZ: America/Maceio
        run: node tools/update-historico.cjs
      - name: Commit do histórico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.json
          if git diff --cached --quiet; then
            echo "Nada para commitar."
          else
            git commit -m "chore: snapshot do acumulo [skip ci]"
            git push
          fi
