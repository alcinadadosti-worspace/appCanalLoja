# Render Blueprint — Static Site
# Deploy automático do Painel Gerencial ACQUA (app offline de arquivo único).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: appcanalloja
    runtime: static
    # Não há build: é HTML estático puro.
    buildCommand: ""
    # Publica a raiz do repositório (onde estão index.html e acumulo.csv).
    staticPublishPath: .
    # Sem rewrite catch-all: é página única e o acumulo.csv precisa ser servido como arquivo.
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
